<nav class="nav">
  <div class="nav-inner">
    <div class="nav-links">
      <a href="/" class="{{ if .IsHome }}active{{ end }}">Home</a>
      <a href="{{ .Site.Home.RelPermalink }}" class="{{ if .IsHome }}active{{ end }}">Blog</a>
      <a href="/recommendations/">Recommendations</a>
      <a href="/#projects">Projects</a>
    </div>
    <div class="nav-lang">
      {{ if .IsTranslated }}
        {{ range .AllTranslations }}
          {{ $label := or .Language.Params.label .Language.Lang }}
          {{ if eq .Language.Lang $.Site.Language.Lang }}
            <span class="active">{{ $label }}</span>
          {{ else }}
            <a href="{{ .RelPermalink }}">{{ $label }}</a>
          {{ end }}
        {{ end }}
      {{ end }}
    </div>
  </div>
</nav>
