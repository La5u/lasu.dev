<nav class="site-nav" aria-label="Primary navigation">
  <div class="site-nav__inner">
    <div class="site-nav__links">
      <a href="/">Home</a>
      <a href="{{ .Site.Home.RelPermalink }}" {{ if .IsHome }}aria-current="page"{{ end }}>Blog</a>
      <a href="/recommendations/">Recommendations</a>
      <a href="/#projects">Projects</a>
    </div>
    <div class="site-nav__languages">
      {{ if .IsTranslated }}
        {{ range .AllTranslations }}
          {{ $label := or .Language.Params.label .Language.Lang }}
          {{ if eq .Language.Lang $.Site.Language.Lang }}
            <span class="active">{{ $label }}</span>
          {{ else }}
            <a href="{{ .RelPermalink }}">{{ $label }}</a>
          {{ end }}
        {{ end }}
      {{ end }}
    </div>
  </div>
</nav>
