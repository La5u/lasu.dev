baseURL = "https://lasu.dev/blog/"
publishDir = "../blog"
cleanDestinationDir = true
title = "Blog"
timeZone = "Asia/Almaty"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
enableGitInfo = true
[params]
  author = "Lasu Shin"
  description = "Articles by Lasu Shin about productivity, technology, health, and digital habits."
[languages]
  [languages.en]
    label = "English"
    weight = 1

  [languages.ru]
    label = "Русский"
    weight = 2


# IMPORTANT: publish into repo-root /blog


[permalinks]
  posts = "/:slug/"
